<!-- FIXTURE: a genuinely inert <button disabled> with very low text contrast (#cccccc on white, ~1.61:1), no click handler could ever fire, no tabindex override | GROUND TRUTH: contested. WCAG 1.4.3's own Understanding document excludes "text ... that is part of an inactive user interface component" from the contrast requirement, and axe-core deliberately skips disabled form controls in its contrast rule -- so PASS is the standard, spec-aligned answer. But some accessibility practitioners argue low-vision users still need to perceive that a control exists and read its label even when disabled, and that the blanket exemption is being used to justify genuinely hard-to-see disabled states. -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>False-positive bait: disabled control, low contrast</title>
</head>
<body style="background:#ffffff; font-family: Arial, sans-serif; padding: 40px; margin:0;">
<h1 style="color:#000000; font-size:20px;">False-positive probe: disabled control exemption</h1>
<p style="color:#333; max-width:520px;">This submit button is genuinely disabled (the disabled attribute is present; there is no script anywhere on this page, so it cannot be re-enabled or clicked). Its text contrast is roughly 1.61:1 against its background.</p>
<button disabled style="font-size:16px; padding:12px 20px; background:#ffffff; color:#cccccc; border:1px solid #e5e5e5; border-radius:6px;">
  Submit application
</button>
</body>
</html>
