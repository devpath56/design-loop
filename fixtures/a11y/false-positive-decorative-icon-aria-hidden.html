<!-- FIXTURE: a properly labeled "Add to cart" button containing a decorative SVG icon marked aria-hidden="true", plus a purely decorative background flourish icon also marked aria-hidden="true" with no accessible name of its own | GROUND TRUTH: PASSES -- this is correct, spec-compliant markup. The button has one clear accessible name ("Add to cart") from its visible text node; the icons are correctly excluded from the accessibility tree and require no name of their own. A checker that naively walks every visual/graphical element looking for a name, rather than respecting aria-hidden exclusion and accessible-name computation order, would wrongly flag the inner <svg> elements as unnamed. -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>False-positive bait: decorative aria-hidden icons</title>
</head>
<body style="background:#ffffff; font-family: Arial, sans-serif; padding: 40px; margin:0;">
<h1 style="color:#000000; font-size:20px;">False-positive probe: correctly hidden decorative icons</h1>
<p style="color:#333; max-width:520px;">Both icons below are aria-hidden and purely decorative. The button's real accessible name comes entirely from its visible text.</p>
<svg width="48" height="48" viewBox="0 0 24 24" aria-hidden="true" focusable="false" style="display:block; margin-bottom:16px; color:#9ca3af;">
  <circle cx="12" cy="12" r="10" fill="currentColor" opacity="0.3"/>
</svg>
<button style="font-size:16px; padding:12px 20px; background:#111827; color:#ffffff; border:none; border-radius:6px; display:inline-flex; align-items:center; gap:8px;">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" focusable="false">
    <circle cx="9" cy="21" r="1"/>
    <circle cx="20" cy="21" r="1"/>
    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
  </svg>
  Add to cart
</button>
</body>
</html>
