<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>clean fixture — a POSITIVE control for craft-evals</title>
<!-- The positive half of the control: every check that FAILS on slop.html must PASS here, so each
     check is pinned between a known-good and a known-bad input. -->
<style>
  body { font-family: system-ui, sans-serif; margin: 40px; color: #14181f; }
  /* 16 / 20 / 32 → three well-separated sizes (ratios 1.25, 1.6): type-scale + hierarchy-size pass */
  h1  { font-size: 32px; font-weight: 700; margin: 0 0 16px; }
  .sub{ font-size: 20px; font-weight: 400; color: #5b6470; margin: 0 0 16px; }  /* 2nd colour → hierarchy-contrast */
  p   { font-size: 16px; font-weight: 400; margin: 0 0 8px; }                    /* 8px-grid gaps */
  .cta{ font-size: 16px; font-weight: 700; margin-top: 24px; transition: opacity 200ms ease-out; }
  .cta:hover  { box-shadow: 0 2px 8px rgba(0,0,0,.2); }   /* non-colour hover → hover-affordance + state-not-colour-alone */
  .cta:focus-visible { outline: 2px solid #4f46e5; }      /* authored focus → focus-authored */
  @media (prefers-reduced-motion: reduce) { .cta { transition: none; } }
</style>
</head>
<body>
  <h1>Sign in</h1>
  <p class="sub">Welcome back. Enter your details to continue.</p>
  <p>Three sizes, two weights, two text colours, eased in-band motion, no spaced dash.</p>
  <button class="cta">Continue</button>
</body>
</html>
