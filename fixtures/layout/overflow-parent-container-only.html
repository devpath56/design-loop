<!-- FIXTURE: content overflows its PARENT card but the document itself never grows a horizontal scrollbar | GROUND TRUTH: the card has overflow-x:hidden, so document.scrollWidth / documentElement.scrollWidth stay within the viewport at both 375px and 1280px — a page-level overflow check reports clean. But inside the card a long single-line label is abruptly cut off mid-word with no ellipsis and no way to reveal the rest, which a human reviewer would call a real, visible layout defect. -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Parent-only Overflow</title>
<style>
 body{margin:0;font-family:sans-serif;padding:16px;}
 .grid{display:flex;gap:12px;}
 .card{width:180px;overflow-x:hidden;border:1px solid #999;padding:8px;}
 .label{white-space:nowrap;}
</style>
</head>
<body>
<h1>Product catalog</h1>
<div class="grid">
  <div class="card"><div class="label">Standard Widget</div></div>
  <div class="card"><div class="label">Industrial-Grade Stainless Steel Widget Mount Kit</div></div>
  <div class="card"><div class="label">Compact Widget</div></div>
</div>
</body>
</html>
