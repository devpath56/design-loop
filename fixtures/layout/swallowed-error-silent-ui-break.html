<head><meta charset="UTF-8"><title>Swallowed Error</title></head>

<h1>Recent orders</h1>
<div id="orders">Loading…</div>
<script>
function renderOrders() {
  var orders = getOrdersFromStore(); // getOrdersFromStore is not defined -> throws
  document.getElementById('orders').innerHTML = orders.map(function(o){ return o.id; }).join(', ');
}
try {
  renderOrders();
} catch (e) {
  // intentionally swallowed: no console.log, no console.error, no rethrow
}
</script>
</body>
</html>
